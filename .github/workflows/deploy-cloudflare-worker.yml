name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cloudflare-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Cloudflare credentials
        id: check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.check.outputs.skip == 'false'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy

      - name: Smoke test deploy
        if: steps.check.outputs.skip == 'false'
        run: |
          for i in 1 2 3 4 5; do
            VER=$(curl -sI https://listhq.com.au/ | grep -i '^x-worker-version:' || true)
            if [ -n "$VER" ]; then echo "OK: $VER"; exit 0; fi
            sleep 5
          done
          echo "WARNING: X-Worker-Version not observed — DNS route may not be wired."
