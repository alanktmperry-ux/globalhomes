    <!-- iconify-icon web component: deferred to idle so it doesn't block first paint.
         Homepage doesn't use it; lazy routes (tools, halo, auth) wait for it to register. -->
    <script>
      (function () {
        function loadIconify() {
          if (window.__iconifyLoaded) return;
          window.__iconifyLoaded = true;
          var s = document.createElement('script');
          s.src = 'https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js';
          s.async = true;
          document.head.appendChild(s);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadIconify, { timeout: 2500 });
        } else {
          setTimeout(loadIconify, 1200);
        }
        // Also load on first interaction in case idle never fires
        var evs = ['pointerdown', 'keydown', 'touchstart'];
        function onFirst() {
          evs.forEach(function (e) { window.removeEventListener(e, onFirst, true); });
          loadIconify();
        }
        evs.forEach(function (e) { window.addEventListener(e, onFirst, { capture: true, passive: true, once: true }); });
      })();
    </script>

    <!-- Analytics — deferred to idle so they don't block first paint.
         GA4 + PostHog still capture pageviews on init; capture_pageview is true. -->
    <script>
      (function () {
        function loadAnalytics() {
          // Google Analytics GA4
          var ga = document.createElement('script');
          ga.async = true;
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-W7XWRWDC15';
          document.head.appendChild(ga);
          window.dataLayer = window.dataLayer || [];
          function gtag(){ dataLayer.push(arguments); }
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-W7XWRWDC15');

          // PostHog now initialised via posthog-js in src/main.tsx (EU host)
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadAnalytics, { timeout: 3000 });
        } else {
          setTimeout(loadAnalytics, 1500);
        }
      })();
    </script>

    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-blue-600 focus:text-white focus:rounded">Skip to main content</a>
    <!--
      Prerendered hero shell. Paints before any JS executes — crushes FCP from
      4-6s to <1s on cold mobile. React replaces the shell on first commit;
      `data-prerender-shell` lets main.tsx decide between createRoot (replace)
      and hydrateRoot (attach). We use createRoot here because the live React
      tree (SiteHeader + Index.tsx custom hero) intentionally diverges from
      this shell, so any hydrate attempt would mismatch and re-render anyway.
    -->

        </nav>

            Australia's only multilingual property platform

            Find your home<span style="color:#2563EB">.</span><br>
