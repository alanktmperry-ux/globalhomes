    <!-- Analytics — deferred to idle so they don't block first paint.
         GA4 + PostHog still capture pageviews on init; capture_pageview is true. -->
    <script>
      (function () {
        function loadAnalytics() {
          // Google Analytics GA4
          var ga = document.createElement('script');
          ga.async = true;
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-W7XWRWDC15';
          document.head.appendChild(ga);
          window.dataLayer = window.dataLayer || [];
          function gtag(){ dataLayer.push(arguments); }
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-W7XWRWDC15');

          // PostHog now initialised via posthog-js in src/main.tsx (EU host)
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadAnalytics, { timeout: 3000 });
        } else {
          setTimeout(loadAnalytics, 1500);
        }
      })();
    </script>
