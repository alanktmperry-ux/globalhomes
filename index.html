  <body>
    <div id="root">
      <div id="app-loader" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#ffffff;min-height:100vh">
        <!-- Minimal header with escape hatches so agents/visitors can act before React hydrates -->
        <header style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid #f1f5f9">
          <a href="/" style="display:flex;align-items:center;gap:0.6rem;text-decoration:none">
            <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#1e40af);display:flex;align-items:center;justify-content:center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
            </div>
            <span style="font-size:1.1rem;font-weight:800;color:#0f172a;letter-spacing:-0.02em">ListHQ</span>
          </a>
          <nav style="display:flex;align-items:center;gap:0.5rem">
            <a href="/agents/login" style="font-size:0.875rem;font-weight:600;color:#0f172a;text-decoration:none;padding:0.5rem 0.9rem;border:1px solid #e2e8f0;border-radius:999px">Agent login</a>
          </nav>
        </header>

        <!-- Compact loading state — does NOT fill the viewport, does NOT block scroll/clicks -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1.5rem 2rem;text-align:center">
          <p style="font-size:0.9rem;color:#64748b;margin:0 0 1rem">Loading ListHQ…</p>
          <div style="width:160px;height:3px;background:#e2e8f0;border-radius:999px;overflow:hidden">
            <div style="height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:999px;animation:loadbar 1.6s ease-in-out infinite"></div>
          </div>
        </div>

        <style>
          @keyframes loadbar { 0% { width:0%; margin-left:0; } 60% { width:70%; } 100% { width:100%; margin-left:100%; } }
        </style>
      </div>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var loader = document.getElementById('app-loader');
          var root = document.getElementById('root');
          if (loader && root && root.children.length > 1) {
            loader.style.transition = 'opacity 0.3s ease';
            loader.style.opacity = '0';
            setTimeout(function() { if (loader) loader.style.display = 'none'; }, 300);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
