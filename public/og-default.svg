<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- House icon -->
  <g transform="translate(96, 200)">
    <polygon points="80,0 160,70 140,70 140,150 20,150 20,70 0,70" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linejoin="round"/>
    <rect x="55" y="90" width="50" height="60" fill="none" stroke="url(#accent)" stroke-width="4" rx="4"/>
  </g>

  <!-- Globe circles (subtle) -->
  <circle cx="1100" cy="480" r="200" fill="none" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <circle cx="1100" cy="480" r="150" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <circle cx="1100" cy="480" r="100" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>

  <!-- Brand name -->
  <text x="96" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="white" letter-spacing="-2">ListHQ</text>

  <!-- Tagline -->
  <text x="100" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(148,163,184,1)">Australia's AI-powered property platform</text>

  <!-- URL -->
  <text x="100" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="rgba(96,165,250,0.9)">listhq.com.au</text>
</svg>
